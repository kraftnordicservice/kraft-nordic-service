<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kontakt — Kraft Nordic Service VSS AB</title>
  <meta name="description" content="Kontakta Kraft Nordic Service VSS AB för installation, service eller akut VVS i Stockholm.">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="topbar">
      <div class="topbar-left">
        <a href="index.html" style="display:flex;align-items:center;gap:.6rem;text-decoration:none;">
          <img src="img/Logo maker project.png" alt="Kraft Nordic Service VSS AB logotyp" class="logo">
          <span class="company-name">Kraft Nordic Service VSS AB</span>
        </a>
      </div>
      <div class="topbar-center"></div>
      <div class="topbar-right">
        <a href="contact.html" class="contact" aria-label="Kontakt">Kontakta oss</a>
        <a href="akut-vvs.html" class="urgent-help" aria-label="Akut hjälp">Akut hjälp</a>
        <a href="priser-villkor.html" class="prices-terms" aria-label="Priser och villkor">Priser & villkor</a>
      </div>
    </div>
  </header>

  <main>
    <section class="contact-bg">
      <div class="contact-box">

        <div class="contact-left">
          <h2>Kontaktinformation</h2>

          <div class="contact-item">
            <span>📍</span>
            <div>
              <strong>Område</strong><br>
              Stockholm med omnejd
            </div>
          </div>

          <div class="contact-item">
            <span>📞</span>
            <div>
              <strong>Telefon</strong><br>
              <a href="tel:0739140177">073-914 01 77</a>
            </div>
          </div>

          <div class="contact-item">
            <span>✉️</span>
            <div>
              <strong>E-post</strong><br>
              <a href="mailto:info@blakraftvvs.se">info@blakraftvvs.se</a>
            </div>
          </div>

          <div class="contact-item">
            <span>⏱</span>
            <div>
              <strong>Öppettider</strong><br>
              Vardagar: meddelas snart<br>
              <em>Vid akuta ärenden – ring när som helst</em>
            </div>
          </div>
        </div>

        <div class="contact-right">
          <h2>Hör av dig!</h2>

          <form action="https://formsubmit.co/info@blakraftvvs.se" method="POST">
            <input type="hidden" name="_subject" value="Ny förfrågan från webbplatsen">
            <input type="hidden" name="_captcha" value="false">

            <label for="contact-name">Namn</label>
            <input id="contact-name" name="name" type="text" placeholder="Ditt namn" autocomplete="name" required>

            <label for="contact-email">E-post</label>
            <input id="contact-email" name="email" type="email" placeholder="Din e-post" autocomplete="email" required>

            <label for="contact-phone">Telefon</label>
            <input id="contact-phone" name="phone" type="tel" placeholder="Ditt telefonnummer" autocomplete="tel">

            <label for="contact-message">Meddelande</label>
            <textarea id="contact-message" name="message" placeholder="Beskriv kort vad du behöver hjälp med" required></textarea>

            <button type="submit" class="btn btn-book">Skicka förfrågan</button>
          </form>
        </div>

      </div>
    </section>
  </main>
</body>
</html>
